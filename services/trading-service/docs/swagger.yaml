definitions:
  dto.CollectTaxesResponse:
    properties:
      message:
        type: string
    type: object
  dto.CreateOrderRequest:
    properties:
      account_number:
        type: string
      all_or_none:
        type: boolean
      direction:
        allOf:
        - $ref: '#/definitions/model.OrderDirection'
        enum:
        - BUY
        - SELL
      limit_value:
        type: number
      listing_id:
        type: integer
      margin:
        type: boolean
      order_type:
        allOf:
        - $ref: '#/definitions/model.OrderType'
        enum:
        - MARKET
        - LIMIT
        - STOP
        - STOP_LIMIT
      quantity:
        minimum: 1
        type: integer
      stop_value:
        type: number
    required:
    - account_number
    - direction
    - listing_id
    - order_type
    - quantity
    type: object
  dto.ExchangeResponse:
    properties:
      acronym:
        type: string
      close_time:
        type: string
      currency:
        type: string
      exchange_id:
        type: integer
      mic_code:
        type: string
      name:
        type: string
      open_time:
        type: string
      polity:
        type: string
      time_zone:
        type: integer
      trading_enabled:
        type: boolean
    type: object
  dto.ListTaxUsersResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.UserTaxEntry'
        type: array
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
      totalPages:
        type: integer
    type: object
  dto.OrderResponse:
    properties:
      account_number:
        type: string
      after_hours:
        type: boolean
      all_or_none:
        type: boolean
      approved_by:
        type: integer
      contract_size:
        type: number
      created_at:
        type: string
      direction:
        $ref: '#/definitions/model.OrderDirection'
      is_done:
        type: boolean
      limit_value:
        type: number
      listing_id:
        type: integer
      listing_name:
        type: string
      margin:
        type: boolean
      order_id:
        type: integer
      order_type:
        $ref: '#/definitions/model.OrderType'
      price_per_unit:
        type: number
      quantity:
        type: integer
      remaining_portions:
        type: integer
      status:
        $ref: '#/definitions/model.OrderStatus'
      stop_value:
        type: number
      ticker:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  dto.UserTaxEntry:
    properties:
      email:
        type: string
      firstName:
        type: string
      id:
        type: integer
      lastName:
        type: string
      taxOwedRsd:
        type: number
      userType:
        type: string
    type: object
  errors.AppError:
    properties:
      message:
        type: string
      status:
        type: string
      timestamp:
        type: string
    type: object
  model.OrderDirection:
    enum:
    - BUY
    - SELL
    type: string
    x-enum-varnames:
    - OrderDirectionBuy
    - OrderDirectionSell
  model.OrderStatus:
    enum:
    - PENDING
    - APPROVED
    - DECLINED
    type: string
    x-enum-varnames:
    - OrderStatusPending
    - OrderStatusApproved
    - OrderStatusDeclined
  model.OrderType:
    enum:
    - MARKET
    - LIMIT
    - STOP
    - STOP_LIMIT
    type: string
    x-enum-varnames:
    - OrderTypeMarket
    - OrderTypeLimit
    - OrderTypeStop
    - OrderTypeStopLimit
info:
  contact: {}
  description: API for managing portfolios, executing trades, and handling financial
    market operations.
  title: Trading Service API
  version: "1.0"
paths:
  /api/exchange:
    get:
      description: Returns a paginated list of all stock exchanges
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all exchanges
      tags:
      - exchange
  /api/exchange/{micCode}/toggle:
    patch:
      description: Enables or disables trading time enforcement for a specific exchange
        (for testing purposes)
      parameters:
      - description: Exchange MIC code
        in: path
        name: micCode
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ExchangeResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Toggle trading enabled for an exchange
      tags:
      - exchange
  /api/health:
    get:
      description: Returns service health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
  /api/orders:
    post:
      consumes:
      - application/json
      description: Creates a buy or sell order for a listing
      parameters:
      - description: Order details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateOrderRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.OrderResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Create a new order
      tags:
      - orders
  /api/orders/{id}/approve:
    patch:
      description: Supervisor approves a pending order
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.OrderResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Approve a pending order
      tags:
      - orders
  /api/orders/{id}/cancel:
    patch:
      description: Cancel a pending or approved order that hasn't been fully executed
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.OrderResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Cancel an order
      tags:
      - orders
  /api/orders/{id}/decline:
    patch:
      description: Supervisor declines a pending order
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.OrderResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Decline a pending order
      tags:
      - orders
  /api/tax/collect:
    post:
      description: Runs the tax collection process for all users. Restricted to authorized
        personnel.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CollectTaxesResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Trigger tax collection
      tags:
      - tax
  /api/tax/users:
    get:
      description: Returns a paginated list of clients and/or actuaries with their
        total tax owed in RSD. Filterable by user type, first name, and last name.
      parameters:
      - description: Filter by user type (client, actuary)
        in: query
        name: userType
        type: string
      - description: Filter by first name
        in: query
        name: first_name
        type: string
      - description: Filter by last name
        in: query
        name: last_name
        type: string
      - description: Page number
        in: query
        minimum: 1
        name: page
        type: integer
      - description: Page size
        in: query
        maximum: 100
        minimum: 1
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListTaxUsersResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: List users with tax information
      tags:
      - tax
securityDefinitions:
  BearerAuth:
    description: JWT Authorization header using the Bearer scheme.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
