info:
  contact: {}
  description: API for managing portfolios, executing trades, and handling financial
    market operations.
  title: Trading Service API
  version: "1.0"
paths:
  /api/actuary/{actId}/accumulated-tax:
    get:
      description: Returns the total accumulated tax for a specific actuary (employee)
        across all accounts in RSD.
      parameters:
      - description: Actuary ID
        in: path
        name: actId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TaxInfoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Get accumulated tax for an actuary
      tags:
      - tax
  /api/actuary/{actId}/assets:
    get:
      description: Returns all currently held asset positions for an actuary (employee
        agent/supervisor), aggregated from all orders. Only approved orders with fills
        are counted. Includes stocks, futures, options, and forex pairs.
      parameters:
      - description: Actuary ID
        in: path
        name: actId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.PortfolioAssetResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Get portfolio for an actuary/agent
      tags:
      - portfolio
  /api/actuary/{actId}/assets/{assetOwnershipId}/dividends:
    get:
      description: Returns dividend payout history for a specific asset ownership
        (position) managed by an actuary.
      parameters:
      - description: Actuary ID
        in: path
        name: actId
        required: true
        type: integer
      - description: Asset Ownership ID
        in: path
        name: assetOwnershipId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListDividendPayoutsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: List actuary dividend payouts for a portfolio position
      tags:
      - dividends
  /api/actuary/{actId}/assets/{ownershipId}/publish:
    patch:
      consumes:
      - application/json
      description: Appends the number of assets the caller makes publicly visible
        on the OTC portal.
      parameters:
      - description: Asset ownership ID
        in: path
        name: ownershipId
        required: true
        type: integer
      - description: Amount to make public
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.PublishAssetRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Publish assets for OTC trading
      tags:
      - otc
  /api/actuary/{actId}/assets/funds:
    get:
      description: Returns all investment funds managed by the specified actuary (supervisor).
        Shows fund value and liquidity.
      parameters:
      - description: Actuary ID
        in: path
        name: actId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ActuaryFundResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Get funds managed by an actuary
      tags:
      - investment-funds
  /api/actuary/{actId}/assets/profit:
    get:
      description: Returns the total accumulated profit across all currently held
        asset positions for an actuary.
      parameters:
      - description: Actuary ID
        in: path
        name: actId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PortfolioProfitResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Get total profit for an actuary portfolio
      tags:
      - portfolio
  /api/actuary/{actId}/options/{assetId}/exercise:
    post:
      consumes:
      - application/json
      description: Exercises one contract of an actuary-owned in-the-money call option
        and buys the underlying stock at the strike price.
      parameters:
      - description: Actuary ID
        in: path
        name: actId
        required: true
        type: integer
      - description: Option asset ID
        in: path
        name: assetId
        required: true
        type: integer
      - description: Exercise request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ExerciseOptionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ExerciseOptionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Exercise an owned option
      tags:
      - portfolio
  /api/client/{clientId}/accumulated-tax:
    get:
      description: Returns the total accumulated tax for a specific client across
        all their accounts in RSD.
      parameters:
      - description: Client ID
        in: path
        name: clientId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TaxInfoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Get accumulated tax for a client
      tags:
      - tax
  /api/client/{clientId}/assets:
    get:
      description: Returns all currently held asset positions for a client, aggregated
        from all orders. Only approved orders with fills are counted. Includes stocks,
        futures, options, and forex pairs.
      parameters:
      - description: Client ID
        in: path
        name: clientId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.PortfolioAssetResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Get portfolio for a client
      tags:
      - portfolio
  /api/client/{clientId}/assets/{assetOwnershipId}/dividends:
    get:
      description: Returns dividend payout history for a specific asset ownership
        (position) belonging to a client.
      parameters:
      - description: Client ID
        in: path
        name: clientId
        required: true
        type: integer
      - description: Asset Ownership ID
        in: path
        name: assetOwnershipId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListDividendPayoutsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: List client dividend payouts for a portfolio position
      tags:
      - dividends
  /api/client/{clientId}/assets/{ownershipId}/publish:
    patch:
      consumes:
      - application/json
      description: Appends the number of assets the caller makes publicly visible
        on the OTC portal.
      parameters:
      - description: Asset ownership ID
        in: path
        name: ownershipId
        required: true
        type: integer
      - description: Amount to make public
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.PublishAssetRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Publish assets for OTC trading
      tags:
      - otc
  /api/client/{clientId}/assets/profit:
    get:
      description: Returns the total accumulated profit across all currently held
        asset positions for a client.
      parameters:
      - description: Client ID
        in: path
        name: clientId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PortfolioProfitResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Get total profit for a client portfolio
      tags:
      - portfolio
  /api/client/{clientId}/funds:
    get:
      description: Returns all investment fund positions for the specified client,
        including share percentage and current value in RSD.
      parameters:
      - description: Client ID
        in: path
        name: clientId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.FundPositionSummaryResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Get client's investment fund positions
      tags:
      - investment-funds
  /api/dividends:
    get:
      description: Returns all dividend payout records. Restricted to supervisors.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListDividendPayoutsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: List all dividend payouts
      tags:
      - dividends
  /api/dividends/trigger:
    post:
      description: Forces immediate dividend processing. For internal use only.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Manually trigger dividend payout
      tags:
