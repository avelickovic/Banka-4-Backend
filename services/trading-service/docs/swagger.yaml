          $ref: '#/definitions/dto.AcceptOfferRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.OtcOptionContractResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Accept OTC offer
      tags:
      - otc
  /api/otc/offers/{id}/counter:
    put:
      consumes:
      - application/json
      description: Either party may update the offer parameters (amount, price in
        RSD, premium in RSD, settlement date).
      parameters:
      - description: Offer ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated offer parameters
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CounterOfferRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.OtcOfferResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Send counter-offer
      tags:
      - otc
  /api/otc/offers/{id}/history:
    get:
      description: Retrieves the negotiation history for a given offer.
      parameters:
      - description: Offer ID
        in: path
        name: id
        required: true
        type: integer
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by date from
        in: query
        name: from
        type: string
      - description: Filter by date to
        in: query
        name: to
        type: string
      - description: Filter by counterparty
        in: query
        name: counterparty
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.OtcNegotiationHistory'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Get negotiation history
      tags:
      - otc
  /api/otc/offers/{id}/reject:
    patch:
      consumes:
      - application/json
      description: Either party may reject the offer, terminating the negotiation.
      parameters:
      - description: Offer ID
        in: path
        name: id
        required: true
        type: integer
      - description: Optional rejection comment
        in: body
        name: request
        schema:
          $ref: '#/definitions/dto.RejectOfferRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.OtcOfferResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Reject OTC offer
      tags:
      - otc
  /api/otc/offers/active:
    get:
      description: Returns all ongoing negotiations (status=ACTIVE) where the authenticated
        user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.OtcOfferResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: List active OTC offers
      tags:
      - otc
  /api/otc/public:
    get:
      description: Returns a paginated list of assets that have been marked public
        by their owners on the OTC portal.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 10)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: List all publicly available OTC assets
      tags:
      - otc
  /api/portfolio/assets/{assetOwnershipId}/dividends:
    get:
      description: Returns dividend payout history for a specific asset ownership
        (position).
      parameters:
      - description: Asset Ownership ID
        in: path
        name: assetOwnershipId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListDividendPayoutsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: List dividend payouts for a portfolio position
      tags:
      - dividends
  /api/price-alerts:
    get:
      description: Lists every price alert owned by the authenticated user (active
        and already-triggered ones).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.PriceAlertResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: List my price alerts
      tags:
      - price-alerts
    post:
      consumes:
      - application/json
      description: Creates a one-shot price alert for the authenticated user. When
        the listing's current price crosses the threshold in the configured direction,
        the user receives an email and the alert auto-deactivates.
      parameters:
      - description: Alert definition
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreatePriceAlertRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.PriceAlertResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Create a price alert
      tags:
      - price-alerts
  /api/price-alerts/{priceAlertId}:
    delete:
      description: Deletes one of the authenticated user's price alerts. Other users'
        alerts return 404 (the resource is hidden, not refused with 403).
      parameters:
      - description: Price alert id
        in: path
        name: priceAlertId
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Delete a price alert
      tags:
      - price-alerts
  /api/profit/actuaries:
    get:
      consumes:
      - application/json
      description: Returns paginated list of actuaries with their profits (agents
        and supervisors)
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Page size
        in: query
        name: page_size
        type: integer
      - description: Filter by first name
        in: query
        name: first_name
        type: string
      - description: Filter by last name
        in: query
        name: last_name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ActuaryProfitResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Get actuary profits
      tags:
      - profit
  /api/profit/funds:
    get:
      consumes:
      - application/json
      description: Returns all investment funds with bank share, manager info and
        profit calculation
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.FundPositionResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Get investment fund positions
      tags:
      - profit
  /api/recurring-orders:
    get:
      description: Returns all recurring orders belonging to the authenticated client
        or actuary
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.RecurringOrderResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Get recurring orders for the authenticated user
      tags:
      - recurring-orders
    post:
      consumes:
      - application/json
      description: Creates a recurring market order that executes automatically at
        the given cadence
      parameters:
      - description: Recurring order details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateRecurringOrderRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.RecurringOrderResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Create a recurring order
      tags:
      - recurring-orders
  /api/recurring-orders/{id}:
    delete:
      description: Cancels and deletes a recurring order owned by the authenticated
        user
      parameters:
      - description: Recurring Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Delete a recurring order
      tags:
      - recurring-orders
  /api/recurring-orders/{id}/pause:
    patch:
      description: Toggles the active state of a recurring order owned by the authenticated
        user
      parameters:
      - description: Recurring Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RecurringOrderResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Pause or resume a recurring order
      tags:
      - recurring-orders
  /api/tax:
    get:
      description: Returns a paginated list of clients and/or actuaries with their
        total tax owed in RSD. Filterable by user type, first name, and last name.
      parameters:
      - description: Filter by user type (client, actuary)
        in: query
        name: userType
        type: string
      - description: Filter by first name
        in: query
        name: first_name
        type: string
      - description: Filter by last name
        in: query
        name: last_name
        type: string
      - description: Page number
        in: query
        minimum: 1
        name: page
        type: integer
      - description: Page size
        in: query
        maximum: 100
        minimum: 1
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListTaxUsersResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: List users with tax information
      tags:
      - tax
  /api/tax/collect:
    post:
      description: Runs the tax collection process for all users. Restricted to authorized
        personnel.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CollectTaxesResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Trigger tax collection
      tags:
      - tax
  /api/watchlists:
    get:
      description: Lists every watchlist owned by the authenticated user (client or
        actuary), with item counts.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.WatchlistResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: List watchlists
      tags:
      - watchlists
    post:
      consumes:
      - application/json
      description: Creates a new, empty watchlist for the authenticated user. Names
        are unique per user.
      parameters:
      - description: Watchlist name
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateWatchlistRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.WatchlistResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Create a watchlist
      tags:
      - watchlists
  /api/watchlists/{watchlistId}:
    delete:
      description: Deletes one of the authenticated user's watchlists and all of its
        items.
      parameters:
      - description: Watchlist ID
        in: path
        name: watchlistId
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Delete a watchlist
      tags:
      - watchlists
    get:
      description: Returns a single watchlist with all of its tracked listings, each
        enriched with current price, daily change and volume. Optionally filtered
        by asset type.
      parameters:
      - description: Watchlist ID
        in: path
        name: watchlistId
        required: true
        type: integer
      - description: 'Filter by asset type: stock|option|future|forexPair'
        in: query
        name: asset_type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.WatchlistDetailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Get watchlist details
      tags:
      - watchlists
  /api/watchlists/{watchlistId}/items:
    post:
      consumes:
      - application/json
      description: Adds a listing (stock, option, future or forex pair) to one of
        the authenticated user's watchlists.
      parameters:
      - description: Watchlist ID
        in: path
        name: watchlistId
        required: true
        type: integer
      - description: Listing to add
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AddWatchlistItemRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Add a listing to a watchlist
      tags:
      - watchlists
  /api/watchlists/{watchlistId}/items/{listingId}:
    delete:
      description: Removes a listing from one of the authenticated user's watchlists.
      parameters:
      - description: Watchlist ID
        in: path
        name: watchlistId
        required: true
        type: integer
      - description: Listing ID
        in: path
        name: listingId
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Remove a listing from a watchlist
      tags:
      - watchlists
securityDefinitions:
  BearerAuth:
    description: JWT Authorization header using the Bearer scheme.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
