      parameters:
      - description: Exchange MIC code
        in: path
        name: micCode
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ExchangeResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Toggle trading enabled for an exchange
      tags:
      - exchange
  /api/funds:
    get:
      description: Returns a paginated list of all investment funds with optional
        filtering and sorting. Accessible to actuaries and clients.
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      - description: Filter by fund name (case-insensitive substring)
        in: query
        name: name
        type: string
      - description: 'Sort by field: name, minimum_contribution, created_at, liquid_assets'
        in: query
        name: sort_by
        type: string
      - description: 'Sort direction: asc, desc'
        in: query
        name: sort_dir
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListFundsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Get all investment funds
      tags:
      - investment-funds
  /api/health:
    get:
      description: Returns service health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
  /api/investment-funds:
    post:
