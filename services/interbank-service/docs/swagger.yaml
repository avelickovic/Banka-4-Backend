definitions:
  dto.Asset:
    properties:
      asset:
        additionalProperties: {}
        type: object
      type:
        allOf:
        - $ref: '#/definitions/dto.AssetType'
        enum:
        - MONAS
        - STOCK
        - OPTION
    required:
    - asset
    - type
    type: object
  dto.AssetType:
    enum:
    - MONAS
    - STOCK
    - OPTION
    type: string
    x-enum-varnames:
    - AssetMonas
    - AssetStock
    - AssetOption
  dto.CurrencyCode:
    enum:
    - RSD
    - EUR
    - USD
    - CHF
    - JPY
    - AUD
    - CAD
    - GBP
    type: string
    x-enum-varnames:
    - CurrencyRSD
    - CurrencyEUR
    - CurrencyUSD
    - CurrencyCHF
    - CurrencyJPY
    - CurrencyAUD
    - CurrencyCAD
    - CurrencyGBP
  dto.ForeignBankId:
    properties:
      id:
        maxLength: 64
        type: string
      routingNumber:
        type: integer
    required:
    - id
    - routingNumber
    type: object
  dto.IdempotenceKey:
    properties:
      locallyGeneratedKey:
        maxLength: 64
        type: string
      routingNumber:
        type: integer
    required:
    - locallyGeneratedKey
    - routingNumber
    type: object
  dto.MessageEnvelope:
    properties:
      idempotenceKey:
        $ref: '#/definitions/dto.IdempotenceKey'
      messageType:
        allOf:
        - $ref: '#/definitions/dto.MessageType'
        enum:
        - NEW_TX
        - COMMIT_TX
        - ROLLBACK_TX
    required:
    - idempotenceKey
    - messageType
    type: object
  dto.MessageType:
    enum:
    - NEW_TX
    - COMMIT_TX
    - ROLLBACK_TX
    type: string
    x-enum-varnames:
    - MessageTypeNewTx
    - MessageTypeCommitTx
    - MessageTypeRollbackTx
  dto.MonetaryValue:
    properties:
      amount:
        type: number
      currency:
        $ref: '#/definitions/dto.CurrencyCode'
    required:
    - amount
    - currency
    type: object
  dto.NoVoteReason:
    properties:
      posting:
        $ref: '#/definitions/dto.Posting'
      reason:
        $ref: '#/definitions/dto.NoVoteReasonKind'
    type: object
  dto.NoVoteReasonKind:
    enum:
    - UNBALANCED_TX
    - NO_SUCH_ACCOUNT
    - NO_SUCH_ASSET
    - UNACCEPTABLE_ASSET
    - INSUFFICIENT_ASSET
    - OPTION_AMOUNT_INCORRECT
    - OPTION_USED_OR_EXPIRED
    - OPTION_NEGOTIATION_NOT_FOUND
    type: string
    x-enum-varnames:
    - ReasonUnbalancedTx
    - ReasonNoSuchAccount
    - ReasonNoSuchAsset
    - ReasonUnacceptableAsset
    - ReasonInsufficientAsset
    - ReasonOptionAmountIncorrect
    - ReasonOptionUsedOrExpired
    - ReasonOptionNegotiationNotFound
  dto.OtcNegotiation:
    properties:
      amount:
        minimum: 1
        type: integer
      buyerAccountNumber:
        description: BuyerAccountNumber is a Banka-4 extension to the protocol's OtcOffer.
        type: string
      buyerId:
        $ref: '#/definitions/dto.ForeignBankId'
      isOngoing:
        type: boolean
      lastModifiedBy:
        $ref: '#/definitions/dto.ForeignBankId'
      premium:
        $ref: '#/definitions/dto.MonetaryValue'
      pricePerUnit:
        $ref: '#/definitions/dto.MonetaryValue'
      sellerId:
        $ref: '#/definitions/dto.ForeignBankId'
      settlementDate:
        type: string
      stock:
        $ref: '#/definitions/dto.StockDescription'
    required:
    - amount
    - buyerId
    - lastModifiedBy
    - pricePerUnit
    - sellerId
    - settlementDate
    - stock
    type: object
  dto.OtcNegotiationView:
    properties:
      id:
        $ref: '#/definitions/dto.ForeignBankId'
      offer:
        $ref: '#/definitions/dto.OtcOffer'
      status:
        description: ongoing | accepted | cancelled | expired
        type: string
      updatedAt:
        type: string
    type: object
  dto.OtcOffer:
    properties:
      amount:
        minimum: 1
        type: integer
      buyerAccountNumber:
        description: BuyerAccountNumber is a Banka-4 extension to the protocol's OtcOffer.
        type: string
      buyerId:
        $ref: '#/definitions/dto.ForeignBankId'
      lastModifiedBy:
        $ref: '#/definitions/dto.ForeignBankId'
      premium:
        $ref: '#/definitions/dto.MonetaryValue'
      pricePerUnit:
        $ref: '#/definitions/dto.MonetaryValue'
      sellerId:
        $ref: '#/definitions/dto.ForeignBankId'
      settlementDate:
        type: string
      stock:
        $ref: '#/definitions/dto.StockDescription'
    required:
    - amount
    - buyerId
    - lastModifiedBy
    - pricePerUnit
    - sellerId
    - settlementDate
    - stock
    type: object
  dto.PeerContract:
    properties:
      amount:
        type: integer
      buyerId:
        $ref: '#/definitions/dto.ForeignBankId'
      createdAt:
        type: string
      exercisedAt:
        type: string
      id:
        $ref: '#/definitions/dto.ForeignBankId'
      negotiationId:
        $ref: '#/definitions/dto.ForeignBankId'
      premium:
        $ref: '#/definitions/dto.MonetaryValue'
      sellerId:
        $ref: '#/definitions/dto.ForeignBankId'
      settlementDate:
        type: string
      status:
        type: string
      strikePrice:
        $ref: '#/definitions/dto.MonetaryValue'
      ticker:
        type: string
      updatedAt:
        type: string
    type: object
  dto.Posting:
    properties:
      account:
        $ref: '#/definitions/dto.TxAccount'
      amount:
        type: number
      asset:
        $ref: '#/definitions/dto.Asset'
    required:
    - account
    - amount
    - asset
    type: object
  dto.PublicStock:
    properties:
      sellers:
        items:
          $ref: '#/definitions/dto.PublicStockSeller'
        type: array
      stock:
        $ref: '#/definitions/dto.StockDescription'
    type: object
  dto.PublicStockSeller:
    properties:
      amount:
        type: integer
      seller:
        $ref: '#/definitions/dto.ForeignBankId'
    type: object
  dto.StockDescription:
    properties:
      ticker:
        type: string
    required:
    - ticker
    type: object
  dto.TransactionVote:
    properties:
      reasons:
        items:
          $ref: '#/definitions/dto.NoVoteReason'
        type: array
      vote:
        $ref: '#/definitions/dto.VoteKind'
    type: object
  dto.TxAccount:
    properties:
      id:
        $ref: '#/definitions/dto.ForeignBankId'
      num:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/dto.TxAccountType'
        enum:
        - PERSON
        - ACCOUNT
        - OPTION
    required:
    - type
    type: object
  dto.TxAccountType:
    enum:
    - PERSON
    - ACCOUNT
    - OPTION
    type: string
    x-enum-varnames:
    - TxAccountPerson
    - TxAccountAccount
    - TxAccountOption
  dto.UserInformation:
    properties:
      bankDisplayName:
        type: string
      displayName:
        type: string
    type: object
  dto.VoteKind:
    enum:
    - "YES"
    - "NO"
    type: string
    x-enum-varnames:
    - VoteYes
    - VoteNo
  errors.AppError:
    properties:
      message:
        type: string
      status:
        type: string
      timestamp:
        type: string
    type: object
  handler.AcceptPeerNegotiationRequest:
    type: object
  handler.CounterPeerNegotiationRequest:
    properties:
      amount:
        minimum: 1
        type: integer
      premium:
        type: number
      premiumCurrency:
        maxLength: 8
        type: string
      priceCurrency:
        maxLength: 8
        type: string
      pricePerStock:
        type: number
      settlementDate:
        type: string
    required:
    - amount
    - premium
    - premiumCurrency
    - priceCurrency
    - pricePerStock
    - settlementDate
    type: object
  handler.CreatePeerNegotiationRequest:
    properties:
      accountNumber:
        type: string
      amount:
        minimum: 1
        type: integer
      premium:
        type: number
      premiumCurrency:
        maxLength: 8
        type: string
      priceCurrency:
        maxLength: 8
        type: string
      pricePerStock:
        type: number
      sellerId:
        $ref: '#/definitions/dto.ForeignBankId'
      settlementDate:
        type: string
      ticker:
        maxLength: 16
        type: string
    required:
    - accountNumber
    - amount
    - premium
    - premiumCurrency
    - priceCurrency
    - pricePerStock
    - sellerId
    - settlementDate
    - ticker
    type: object
  handler.ExerciseContractRequest:
    properties:
      accountNumber:
        type: string
    required:
    - accountNumber
    type: object
info:
  contact: {}
  description: |-
    Bank-to-bank coordination service implementing the inter-bank
    transaction and OTC negotiation protocol. Authentication is
    per-peer via the X-Api-Key header (see §2.10).
  title: Interbank Service API
  version: "1.0"
paths:
  /api/peer-otc/contracts:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.PeerContract'
            type: array
      security:
      - BearerAuth: []
      summary: List my cross-bank OTC contracts
      tags:
      - peer-otc
  /api/peer-otc/contracts/{rn}/{id}/exercise:
    post:
      parameters:
      - description: Authoritative bank routing number
        in: path
        name: rn
        required: true
        type: integer
      - description: Contract id
        in: path
        name: id
        required: true
        type: string
      - description: Buyer account number
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ExerciseContractRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PeerContract'
      security:
      - BearerAuth: []
      summary: Exercise a cross-bank OTC contract
      tags:
      - peer-otc
  /api/peer-otc/negotiations:
    get:
      description: |-
        Returns every cross-bank negotiation in which the
        authenticated user is a party.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.OtcNegotiationView'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: List my cross-bank OTC negotiations
      tags:
      - peer-otc
    post:
      consumes:
      - application/json
      description: |-
        The authenticated user becomes the buyer. The request is
        forwarded to the seller's bank via §3.2; on success the
        authoritative id assigned by the peer is returned.
      parameters:
      - description: Offer terms
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreatePeerNegotiationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ForeignBankId'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "502":
          description: Peer unreachable or returned non-2xx
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Initiate a cross-bank OTC negotiation
      tags:
      - peer-otc
  /api/peer-otc/negotiations/{rn}/{id}:
    delete:
      description: Closes the negotiation locally and notifies the peer via §3.5.
      parameters:
      - description: Authoritative bank routing number
        in: path
        name: rn
        required: true
        type: integer
      - description: Negotiation id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Withdraw from a cross-bank negotiation
      tags:
      - peer-otc
  /api/peer-otc/negotiations/{rn}/{id}/accept:
    post:
      consumes:
      - application/json
      parameters:
      - description: Authoritative bank routing number
        in: path
        name: rn
        required: true
        type: integer
      - description: Negotiation id
        in: path
        name: id
        required: true
        type: string
      - description: Local account number
        in: body
        name: request
        schema:
          $ref: '#/definitions/handler.AcceptPeerNegotiationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PeerContract'
      security:
      - BearerAuth: []
      summary: Accept a cross-bank OTC negotiation
      tags:
      - peer-otc
  /api/peer-otc/negotiations/{rn}/{id}/counter:
    put:
      consumes:
      - application/json
      description: |-
        Posts a counter-offer whether the authenticated user is the
        buyer or the seller, notifying the opposing party's bank via §3.3.
      parameters:
      - description: Authoritative bank routing number
        in: path
        name: rn
        required: true
        type: integer
      - description: Negotiation id
        in: path
        name: id
        required: true
        type: string
      - description: Counter terms
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CounterPeerNegotiationRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Post a counter-offer on a cross-bank negotiation
      tags:
      - peer-otc
  /api/peer-otc/public-stocks:
    get:
      description: |-
        Aggregates §3.1 /public-stock results from every peer in
        the registry. Peers that fail are silently skipped.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.PublicStock'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Browse public OTC stocks across all peer banks
      tags:
      - peer-otc
  /interbank:
    post:
      consumes:
      - application/json
      description: |-
        Single ingress endpoint for the bank-to-bank protocol (§2.11).
        Accepts NEW_TX, COMMIT_TX and ROLLBACK_TX messages. The
        X-Api-Key header authenticates the sending bank.
      parameters:
      - description: Peer bank API key issued to the caller
        in: header
        name: X-Api-Key
        required: true
        type: string
      - description: Message envelope (messageType + body)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.MessageEnvelope'
      produces:
      - application/json
      responses:
        "200":
          description: NEW_TX accepted with a vote
          schema:
            $ref: '#/definitions/dto.TransactionVote'
        "202":
          description: Accepted, sender must retransmit later
        "204":
          description: Accepted, no response body
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Receive an inter-bank message
      tags:
      - interbank
  /interbank/negotiations:
    post:
      consumes:
      - application/json
      description: |-
        §3.2 — peer bank's buyer initiates a negotiation against
        a seller in our bank. Returns the ForeignBankId of the
        new negotiation owned by us.
      parameters:
      - description: Peer bank API key
        in: header
        name: X-Api-Key
        required: true
        type: string
      - description: Initial offer
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.OtcOffer'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ForeignBankId'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Create OTC negotiation (peer-initiated)
      tags:
      - interbank-otc
  /interbank/negotiations/{rn}/{id}:
    delete:
      description: |-
        §3.5 — either party may withdraw from a negotiation (the
        recipient may be the authoritative or the mirror side). The
        operation is idempotent: closing an already-closed negotiation
        returns 204 without changing state.
      parameters:
      - description: Peer bank API key
        in: header
        name: X-Api-Key
        required: true
        type: string
      - description: Authoritative (seller's) routing number
        in: path
        name: rn
        required: true
        type: integer
      - description: Negotiation id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Close OTC negotiation
      tags:
      - interbank-otc
    get:
      description: |-
        §3.4 — returns the current negotiation state as the spec shape
        (the OtcOffer fields plus isOngoing). The :rn path parameter is
        the negotiation's authoritative (seller's) routing number.
      parameters:
      - description: Peer bank API key
        in: header
        name: X-Api-Key
        required: true
        type: string
      - description: Authoritative (seller's) routing number
        in: path
        name: rn
        required: true
        type: integer
      - description: Negotiation id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.OtcNegotiation'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Get OTC negotiation
      tags:
      - interbank-otc
    put:
      consumes:
      - application/json
      description: |-
        §3.3 — a peer bank posts a counter-offer (either party may
        counter; the recipient may be the authoritative seller's bank
        or the buyer's mirror-holding bank). Buyer/seller and ticker are
        immutable; only negotiable parameters may change. The same party
        may not counter twice in a row (turn rule).
      parameters:
      - description: Peer bank API key
        in: header
        name: X-Api-Key
        required: true
        type: string
      - description: Authoritative (seller's) routing number
        in: path
        name: rn
        required: true
        type: integer
      - description: Negotiation id
        in: path
        name: id
        required: true
        type: string
      - description: Updated offer
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.OtcOffer'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
        "409":
          description: Turn violation or negotiation closed
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Post counter-offer
      tags:
      - interbank-otc
  /interbank/negotiations/{rn}/{id}/accept:
    get:
      description: |-
        §3.6 — accepts the current offer on a negotiation owned by us
        (we are the seller's authoritative bank). Forms the option
        contract and drives the §2 NEW_TX that moves the premium, then
        returns the resulting contract.
      parameters:
      - description: Peer bank API key
        in: header
        name: X-Api-Key
        required: true
        type: string
      - description: Routing number (this bank)
        in: path
        name: rn
        required: true
        type: integer
      - description: Negotiation id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PeerContract'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Accept OTC negotiation
      tags:
      - interbank-otc
  /interbank/public-stock:
    get:
      description: |-
        §3.1 — returns every stock holding at this bank that has
        a non-zero public amount, grouped by ticker with the list
        of sellers and their available quantities. Data pulled
        from trading-service via gRPC.
      parameters:
      - description: Peer bank API key
        in: header
        name: X-Api-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.PublicStock'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: List public stocks at this bank
      tags:
      - interbank-otc
  /interbank/user/{rn}/{id}:
    get:
      description: |-
        §3.7 — peer banks call us to resolve one of our users into
        a display name. routingNumber must match ours; id is the
        local user id encoded as a decimal string.
      parameters:
      - description: Peer bank API key
        in: header
        name: X-Api-Key
        required: true
        type: string
      - description: Routing number (this bank)
        in: path
        name: rn
        required: true
        type: integer
      - description: User id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserInformation'
        "400":
