name: Docker CI
run-name: Checking if the Docker image on ${{ github.repository }} builds successfully

on: [push, pull_request]

jobs:
  build-dev:
    runs-on: ubuntu-latest
    environment: development
    steps:
    - name: Check out repository code after a ${{ github.event_name }} event
      uses: actions/checkout@v5
    - name: Run the compose file
      run: docker compose -f docker-compose-dev.yml up -d --build
    - name: Check if the containers are running
      run: docker compose -f docker-compose-dev.yml ps

