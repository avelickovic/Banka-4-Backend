name: Docker Build and Kubernetes Deploy
run-name: Docker build and K8s deploy for ${{ github.repository }}

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  docker-build:
    name: Docker build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - banking-service
          - email-service
          - interbank-service
          - trading-service
          - user-service
          
    steps:
      - name: Check out ${{ github.ref }} after a ${{ github.event_name }} event
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image for ${{ matrix.service }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name == 'push' }}
          build-args: |
            SERVICE=${{ matrix.service }}
          tags: ghcr.io/raf-si-2025/banka-4-backend/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy-k8s:
    name: Kubernetes deploy ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        service:
          - banking-service
          - email-service
          - interbank-service
          - trading-service
          - user-service
    
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d
        with:
          version: 'v1.35.5'

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to Kubernetes
        run: kubectl rollout restart deployment ${{ matrix.service }}