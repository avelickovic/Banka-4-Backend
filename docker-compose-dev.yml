services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  user_service_db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 3s
      timeout: 5s
      retries: 5
    volumes:
      - user_service_db_data:/var/lib/postgresql/data
    depends_on:
      redis:
        condition: service_healthy

  user_service:
    build:
      context: .
      dockerfile: docker/Dockerfile-dev
    ports:
      - "${PORT}:${PORT}"
    env_file: .env
    environment:
      TRADING_SERVICE_ADDR: trading_service:50053
      EMAIL_SERVICE_ADDR: email_service:50054
      AIR_CONFIG_PATH: /app/services/user-service/.air.toml
    depends_on:
      user_service_db:
        condition: service_healthy
      redis:
        condition: service_healthy
      email_service:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:${PORT}/api/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - .:/app:z
      - /app/tmp
      - /go/pkg/mod
    working_dir: /app/services/user-service

  banking_service:
    build:
      context: .
      dockerfile: docker/Dockerfile-dev
    ports:
      - "${BANKING_SERVICE_PORT}:${BANKING_SERVICE_PORT}"
    env_file: .env
    environment:
      AIR_CONFIG_PATH: /app/services/banking-service/.air.toml
      PORT: ${BANKING_SERVICE_PORT}
      GRPC_PORT: "50052"
      USER_SERVICE_ADDR: user_service:50051
      USER_SERVICE_BASE_URL: http://user_service:${PORT}
      EMAIL_SERVICE_ADDR: email_service:50054
      INTERBANK_SERVICE_ADDR: interbank_service:50054
      WORK_CODES_CACHE_TTL: 24h
    depends_on:
      user_service_db:
        condition: service_healthy
      user_service:
        condition: service_healthy
      email_service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:${BANKING_SERVICE_PORT}/api/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    volumes:
      - .:/app:z
      - /app/tmp
      - /go/pkg/mod
    working_dir: /app/services/banking-service

  trading_service:
    build:
      context: .
      dockerfile: docker/Dockerfile-dev
    ports:
      - "${TRADING_SERVICE_PORT}:${TRADING_SERVICE_PORT}"
    env_file: .env
    environment:
      GRPC_PORT: 50053
      AIR_CONFIG_PATH: /app/services/trading-service/.air.toml
      PORT: ${TRADING_SERVICE_PORT}
      USER_SERVICE_ADDR: user_service:50051
      USER_SERVICE_BASE_URL: http://user_service:${PORT}
      BANKING_SERVICE_ADDR: banking_service:50052
      EMAIL_SERVICE_ADDR: email_service:50054
    depends_on:
      user_service_db:
        condition: service_healthy
      user_service:
        condition: service_healthy
      email_service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:${TRADING_SERVICE_PORT}/api/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    volumes:
      - .:/app:z
      - /app/tmp
      - /go/pkg/mod
    working_dir: /app/services/trading-service

  interbank_service:
    build:
      context: .
      dockerfile: docker/Dockerfile-dev
    ports:
      - "${INTERBANK_SERVICE_PORT}:${INTERBANK_SERVICE_PORT}"
    env_file: .env
    environment:
      AIR_CONFIG_PATH: /app/services/interbank-service/.air.toml
      PORT: ${INTERBANK_SERVICE_PORT}
      GRPC_PORT: "50054"
      INTERBANK_ROUTING_NUMBER: "444"
      INTERBANK_PEERS_CONFIG_PATH: /app/services/interbank-service/peers.yaml
      USER_SERVICE_ADDR: user_service:50051
      TRADING_SERVICE_ADDR: trading_service:50053
      BANKING_SERVICE_ADDR: banking_service:50052
    depends_on:
      user_service_db:
        condition: service_healthy
      banking_service:
        condition: service_healthy
      trading_service:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:${INTERBANK_SERVICE_PORT}/api/health || exit 1
    volumes:
      - .:/app:z
      - /app/tmp
      - /go/pkg/mod
    working_dir: /app/services/interbank-service

  email_service:
    build:
      context: .
      dockerfile: docker/Dockerfile-dev
    ports:
      - "${EMAIL_SERVICE_PORT}:${EMAIL_SERVICE_PORT}"
    env_file: .env
    environment:
      AIR_CONFIG_PATH: /app/services/email-service/.air.toml
      PORT: ${EMAIL_SERVICE_PORT}
      GRPC_PORT: "50054"
    depends_on:
      maildev:
        condition: service_started
    healthcheck:
      test: curl -f http://localhost:${EMAIL_SERVICE_PORT}/api/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - .:/app:z
      - /app/tmp
      - /go/pkg/mod
    working_dir: /app/services/email-service

  maildev:
    image: maildev/maildev:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "1080:1080"
    environment:
      MAILDEV_SMTP_PORT: 1025
      MAILDEV_WEB_PORT: 1080
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - maildev_data:/data

volumes:
  redis_data:
  user_service_db_data:
  maildev_data:
